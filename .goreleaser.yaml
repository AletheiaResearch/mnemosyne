version: 2

project_name: mnemosyne

before:
  hooks:
    - go test ./...
    - go run ./cmd/gendocs ./man/man1

builds:
  - id: mnemosyne
    main: ./cmd/mnemosyne
    binary: mnemosyne
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/AletheiaResearch/mnemosyne/internal/version.Version={{.Version}} -X github.com/AletheiaResearch/mnemosyne/internal/version.Commit={{.Commit}} -X github.com/AletheiaResearch/mnemosyne/internal/version.Date={{.Date}}

archives:
  - formats:
      - tar.gz
    files:
      - README.md
      - schemas/**
      - man/man1/*.1

homebrew_casks:
  - name: mnemosyne
    repository:
      owner: AletheiaResearch
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/AletheiaResearch/mnemosyne
    description: Export coding-assistant histories to unified, anonymized archives.
    binaries:
      - mnemosyne
    manpages:
      - man/man1/mnemosyne.1
      - man/man1/mnemosyne-attest.1
      - man/man1/mnemosyne-configure.1
      - man/man1/mnemosyne-extract.1
      - man/man1/mnemosyne-inspect.1
      - man/man1/mnemosyne-publish.1
      - man/man1/mnemosyne-runlog.1
      - man/man1/mnemosyne-serializers.1
      - man/man1/mnemosyne-survey.1
      - man/man1/mnemosyne-templates.1
      - man/man1/mnemosyne-transform.1
      - man/man1/mnemosyne-validate.1
    dependencies:
      - formula: hf
    hooks:
      post:
        install: |
          FileUtils.ln_sf "#{HOMEBREW_PREFIX}/bin/mnemosyne", "#{HOMEBREW_PREFIX}/bin/mem"
        uninstall: |
          FileUtils.rm_f "#{HOMEBREW_PREFIX}/bin/mem"
  - name: "mnemosyne@{{ .Version }}"
    repository:
      owner: AletheiaResearch
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/AletheiaResearch/mnemosyne
    description: Export coding-assistant histories to unified, anonymized archives.
    binaries:
      - mnemosyne
    manpages:
      - man/man1/mnemosyne.1
      - man/man1/mnemosyne-attest.1
      - man/man1/mnemosyne-configure.1
      - man/man1/mnemosyne-extract.1
      - man/man1/mnemosyne-inspect.1
      - man/man1/mnemosyne-publish.1
      - man/man1/mnemosyne-runlog.1
      - man/man1/mnemosyne-serializers.1
      - man/man1/mnemosyne-survey.1
      - man/man1/mnemosyne-templates.1
      - man/man1/mnemosyne-transform.1
      - man/man1/mnemosyne-validate.1
    dependencies:
      - formula: hf

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  use: github
  sort: asc
  abbrev: -1
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^style:"
      - "^ci:"
      - "(?i)^Merge pull request"
      - "(?i)^Merge remote-tracking branch"
      - "(?i)^Merge branch"
  groups:
    - title: Features
      regexp: "^.*feat(\\(.+\\))?!?:.*"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix(\\(.+\\))?!?:.*"
      order: 1
    - title: Performance improvements
      regexp: "^.*perf(\\(.+\\))?!?:.*"
      order: 2
    - title: Refactors
      regexp: "^.*refactor(\\(.+\\))?!?:.*"
      order: 3
    - title: Build & dependencies
      regexp: "^.*build(\\(.+\\))?!?:.*"
      order: 4
    - title: Other changes
      order: 999
